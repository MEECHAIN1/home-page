services:
  meechain-dashboard:
    container_name: meechain-dashboard
    build:
      context: .
      dockerfile: Dockerfile
    image: meechain-dashboard:latest
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
    env_file:
      - .env
    volumes:
      - meechain_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health | grep -q '\"status\":\"ok\"'"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  meechain_logs: